<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Latihan DOM JavaScript</title>
    <style>
        .box { width: 200px; height: 200px; border: 2px solid black; margin: 20px; transition: 0.3s; }
        .bg-red { background-color: red; }
        .text-white { color: white; }
    </style>
</head>
<body>

    <div id="kotak" class="box">Halo!</div>

    <button id="btn-isi">1. Ubah Isi</button>
    <button id="btn-warna">2. Ubah Warna (Style)</button>
    <button id="btn-atribut">3. Tambah Atribut</button>
    <button id="btn-class">4. Toggle Class</button>

    <script src="script.js"></script>
</body>
</html>
